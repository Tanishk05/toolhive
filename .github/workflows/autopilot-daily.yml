name: ToolHive Autopilot Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"
    - cron: "45 5 * * *"
    - cron: "15 8 * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: autopilot-daily
  cancel-in-progress: false

jobs:
  daily-tools:
    name: Add 5 tool candidates
    if: github.event.schedule == '15 2 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run autopilot:daily-tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AUTOPILOT_DRY_RUN: "false"
          GITHUB_REPOSITORY: ${{ github.repository }}

  seo-opportunities:
    name: Detect SEO opportunities
    if: github.event.schedule == '45 5 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run autopilot:seo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AUTOPILOT_DRY_RUN: "false"
          GITHUB_REPOSITORY: ${{ github.repository }}

  market-intel:
    name: Ecosystem and competitor scans
    if: github.event.schedule == '15 8 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run autopilot:ecosystem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AUTOPILOT_DRY_RUN: "false"
          GITHUB_REPOSITORY: ${{ github.repository }}
      - run: npm run autopilot:competitors
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AUTOPILOT_DRY_RUN: "false"
          GITHUB_REPOSITORY: ${{ github.repository }}
